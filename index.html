<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="referrer" content="strict-origin-when-cross-origin" />
<title>Bulles en Valais — Plongée & Formation</title>
<link rel="icon" href="images/logo.png" type="image/png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============ TWEAK VARIABLES ============ */
:root {
  --bg: #fafaf7;
  --bg-2: #f0ede6;
  --bg-3: #e8e4dc;
  --ink: #0f1e28;
  --ink-soft: #3a4a54;
  --ink-muted: #6b7a82;
  --line: #d8d2c6;
  --deep: #0f3a4f;
  --deep-2: #0a2838;
  --accent: #b85c3b;
  --accent-soft: #d9ab94;
  --surface: #ffffff;

  --font-display: 'Instrument Serif', ui-serif, Georgia, serif;
  --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;

  --radius: 2px;
  --radius-lg: 6px;
  --max: 1320px;
  --pad: clamp(20px, 4vw, 48px);
}

[data-theme="dark"] {
  --bg: #0a1519;
  --bg-2: #0f1e24;
  --bg-3: #162830;
  --ink: #f0ede6;
  --ink-soft: #c8c0b0;
  --ink-muted: #8a9199;
  --line: #243840;
  --deep: #5a9bb0;
  --deep-2: #7ab3c4;
  --accent: #d9754e;
  --accent-soft: #8a4530;
  --surface: #0f1e24;
}

[data-palette="nordic"] {
  --bg: #f5f5f2;
  --bg-2: #ebe9e2;
  --bg-3: #dddbd2;
  --ink: #1a1a1a;
  --deep: #2d4a3e;
  --deep-2: #1f3329;
  --accent: #8a6a3a;
  --accent-soft: #c8c0b0;
}

[data-palette="glacier"] {
  --bg: #fafcfd;
  --bg-2: #eef3f6;
  --bg-3: #d9e3e9;
  --ink: #0d1a26;
  --deep: #0d1a26;
  --deep-2: #050d14;
  --accent: #7a9bb8;
  --accent-soft: #b8cad8;
}

[data-palette="sunset"] {
  --bg: #faf5ef;
  --bg-2: #f0e6d8;
  --bg-3: #e4d5c0;
  --ink: #1c1410;
  --deep: #3a1f14;
  --deep-2: #24120a;
  --accent: #c96a3a;
  --accent-soft: #e0a57f;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--ink);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}

img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }

/* ========== TYPOGRAPHY ========== */
.serif { font-family: var(--font-display); font-weight: 400; letter-spacing: -0.01em; }
.mono { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }

h1, h2, h3 { font-family: var(--font-display); font-weight: 400; letter-spacing: -0.02em; line-height: 1.02; text-wrap: balance; }

.eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-muted);
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.eyebrow::before {
  content: "";
  width: 20px; height: 1px;
  background: var(--ink-muted);
}

/* ========== LAYOUT ========== */
.container { max-width: var(--max); margin: 0 auto; padding: 0 var(--pad); }
section { padding: clamp(80px, 10vw, 140px) 0; position: relative; }

/* ========== NAV ========== */
.nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 18px var(--pad);
  display: flex; align-items: center; justify-content: space-between;
  transition: all 0.35s cubic-bezier(.2,.8,.2,1);
  background: transparent;
}
.nav.scrolled {
  background: color-mix(in oklab, var(--bg) 85%, transparent);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--line);
  padding: 12px var(--pad);
}
.nav-logo {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-display);
  font-size: 22px;
  color: var(--ink);
}
.nav-logo-mark {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--deep);
  display: grid; place-items: center;
  color: var(--bg);
}
.nav.hero-white .nav-logo { color: #fff; }
.nav.hero-white:not(.scrolled) .nav-link { color: rgba(255,255,255,0.85); }
.nav.hero-white:not(.scrolled) .nav-link:hover { color: #fff; }
.nav.hero-white:not(.scrolled) .lang-switch { color: rgba(255,255,255,0.75); border-color: rgba(255,255,255,0.3); }

.nav-links { display: flex; gap: 32px; align-items: center; }
.nav-link {
  font-size: 13px;
  letter-spacing: 0.02em;
  color: var(--ink-soft);
  transition: color 0.2s;
  position: relative;
}
.nav-link:hover { color: var(--ink); }
.nav-cta {
  padding: 10px 20px;
  background: var(--ink);
  color: var(--bg);
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  transition: all 0.2s;
}
.nav.hero-white:not(.scrolled) .nav-cta { background: #fff; color: var(--deep-2); }
.nav-cta:hover { transform: translateY(-1px); }

.lang-switch {
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: 0.12em;
  padding: 5px 10px;
  border: 1px solid var(--line);
  border-radius: 2px;
  color: var(--ink-muted);
  display: flex; gap: 6px;
}
.lang-switch span { cursor: pointer; }
.lang-switch span.active { color: var(--ink); font-weight: 500; }

.burger { display: none; flex-direction: column; gap: 4px; width: 24px; }
.burger span { height: 1px; background: currentColor; transition: all 0.3s; }

.mobile-menu { display: none; }

@media (max-width: 900px) {
  .nav-links { display: none; }
  .burger { display: flex; color: var(--ink); }
  .nav.hero-white:not(.scrolled) .burger { color: #fff; }
  .mobile-menu {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 99;
    padding: 80px var(--pad) var(--pad);
    display: flex; flex-direction: column; gap: 24px;
    transform: translateY(-100%);
    transition: transform 0.4s cubic-bezier(.2,.8,.2,1);
  }
  .mobile-menu.open { transform: translateY(0); }
  .mobile-menu a { font-family: var(--font-display); font-size: 32px; }
}

/* ========== HERO ========== */
.hero {
  min-height: 100vh;
  position: relative;
  padding: 0;
  overflow: hidden;
  display: flex;
  align-items: flex-end;
  color: #fff;
}
.hero-bg {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center;
  z-index: 0;
}
.hero-bg::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(10,30,45,0.25) 0%, rgba(10,30,45,0.1) 40%, rgba(10,30,45,0.85) 100%);
}
.hero-grain {
  position: absolute; inset: 0;
  opacity: 0.05; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='400' height='400' filter='url(%23n)'/%3E%3C/svg%3E");
  z-index: 1;
}
.hero-content {
  position: relative; z-index: 2;
  width: 100%;
  padding: 0 var(--pad) clamp(60px, 8vw, 100px);
  max-width: var(--max);
  margin: 0 auto;
}
.hero-eyebrow {
  color: rgba(255,255,255,0.75);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-bottom: 24px;
  display: flex; align-items: center; gap: 12px;
}
.hero-eyebrow::before {
  content: ""; width: 32px; height: 1px; background: rgba(255,255,255,0.5);
}
.hero h1 {
  font-size: clamp(56px, 9vw, 140px);
  line-height: 0.95;
  font-weight: 400;
  margin-bottom: 32px;
  max-width: 14ch;
  letter-spacing: -0.03em;
}
.hero h1 em { font-style: italic; color: var(--accent-soft); }
.hero-sub {
  font-size: clamp(16px, 1.4vw, 19px);
  max-width: 48ch;
  color: rgba(255,255,255,0.82);
  line-height: 1.55;
  margin-bottom: 40px;
  font-weight: 300;
}
.hero-cta-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
.btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 16px 28px;
  font-size: 14px;
  letter-spacing: 0.02em;
  font-weight: 500;
  border-radius: var(--radius);
  transition: all 0.25s;
  cursor: pointer;
}
.btn-primary { background: #fff; color: var(--deep-2); }
.btn-primary:hover { background: var(--accent); color: #fff; transform: translateY(-2px); }
.btn-ghost { color: #fff; border: 1px solid rgba(255,255,255,0.3); }
.btn-ghost:hover { border-color: #fff; background: rgba(255,255,255,0.08); }
.btn-dark { background: var(--ink); color: var(--bg); }
.btn-dark:hover { background: var(--accent); }
.btn-outline { border: 1px solid var(--ink); color: var(--ink); }
.btn-outline:hover { background: var(--ink); color: var(--bg); }

.hero-meta {
  position: absolute;
  bottom: clamp(30px, 5vw, 60px);
  right: var(--pad);
  z-index: 3;
  font-family: var(--font-mono);
  font-size: 10px;
  color: rgba(255,255,255,0.6);
  text-align: right;
  letter-spacing: 0.14em;
}
.hero-meta strong { display: block; color: #fff; font-weight: 500; font-size: 11px; }

.hero-credentials {
  position: absolute;
  top: 50%; right: var(--pad);
  transform: translateY(-50%) rotate(90deg);
  transform-origin: right center;
  z-index: 3;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.24em;
  color: rgba(255,255,255,0.55);
  text-transform: uppercase;
  white-space: nowrap;
}

/* Hero variants */
.hero-split { display: grid; grid-template-columns: 1fr 1fr; align-items: stretch; min-height: 100vh; }
.hero-split .hero-bg { position: relative; }
.hero-split .hero-text-side {
  background: var(--bg);
  color: var(--ink);
  padding: 120px var(--pad) 60px;
  display: flex; flex-direction: column; justify-content: center;
}
.hero-split .hero-text-side h1 { color: var(--ink); }
.hero-split .hero-text-side .hero-sub { color: var(--ink-soft); }
.hero-split .hero-text-side .hero-eyebrow { color: var(--ink-muted); }
.hero-split .hero-text-side .hero-eyebrow::before { background: var(--ink-muted); }
.hero-split .btn-primary { background: var(--ink); color: var(--bg); }
.hero-split .btn-ghost { color: var(--ink); border-color: var(--line); }
.hero-split .btn-ghost:hover { border-color: var(--ink); }
@media (max-width: 900px) {
  .hero-split { grid-template-columns: 1fr; }
  .hero-split .hero-bg-side { min-height: 50vh; }
}

.hero-minimal {
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  align-items: center;
  padding-top: 100px;
}
.hero-minimal h1 { color: var(--ink); max-width: 16ch; }
.hero-minimal .hero-sub { color: var(--ink-soft); }
.hero-minimal .hero-eyebrow { color: var(--ink-muted); }
.hero-minimal .hero-eyebrow::before { background: var(--ink-muted); }
.hero-minimal .btn-primary { background: var(--ink); color: var(--bg); }
.hero-minimal .btn-ghost { color: var(--ink); border-color: var(--line); }
.hero-minimal .hero-bg { background: var(--bg-2); }
.hero-minimal .hero-bg::after { display: none; }
.hero-minimal .hero-image-wrap {
  position: absolute;
  right: var(--pad); top: 50%;
  transform: translateY(-50%);
  width: 42vw; height: 70vh;
  max-height: 620px;
  background-size: cover; background-position: center;
  border-radius: var(--radius-lg);
  z-index: 2;
  filter: saturate(0.9);
}
@media (max-width: 900px) {
  .hero-minimal .hero-image-wrap { display: none; }
}

/* ========== SECTION HEADER ========== */
.sec-header {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 80px;
  margin-bottom: 80px;
  align-items: start;
}
.sec-header h2 {
  font-size: clamp(40px, 5vw, 72px);
  line-height: 1;
}
.sec-header h2 em { font-style: italic; color: var(--deep); }
.sec-lead {
  font-size: clamp(17px, 1.5vw, 20px);
  color: var(--ink-soft);
  line-height: 1.5;
  max-width: 54ch;
  font-weight: 300;
}
@media (max-width: 900px) {
  .sec-header { grid-template-columns: 1fr; gap: 24px; margin-bottom: 48px; }
}

/* ========== ABOUT ========== */
.about { background: var(--bg); }
.about-grid {
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: 80px;
  align-items: center;
}
.about-portrait {
  aspect-ratio: 4/5;
  background: var(--bg-3);
  border-radius: var(--radius-lg);
  position: relative;
  overflow: hidden;
}
.about-portrait img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center bottom;
  display: block;
}
.about-portrait-placeholder {
  position: absolute; inset: 20px;
  border: 1px dashed rgba(255,255,255,0.35);
  display: grid; place-items: center;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.8);
  text-transform: uppercase;
  text-align: center;
  padding: 20px;
}
.about-text p { margin-bottom: 20px; color: var(--ink-soft); font-size: 17px; line-height: 1.65; }
.about-text p.lead { font-size: 22px; color: var(--ink); font-family: var(--font-display); line-height: 1.35; margin-bottom: 32px; }
.about-credentials {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 40px;
  padding-top: 40px;
  border-top: 1px solid var(--line);
}
.cred {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--ink-muted);
  text-transform: uppercase;
}
.cred strong {
  display: block;
  font-family: var(--font-sans);
  font-size: 18px;
  color: var(--ink);
  font-weight: 500;
  letter-spacing: 0;
  text-transform: none;
  margin-top: 6px;
}
@media (max-width: 900px) {
  .about-grid { grid-template-columns: 1fr; gap: 48px; }
}

/* ========== AGENCIES ========== */
.agencies { background: var(--bg-2); }

.agency-selector {
  display: flex;
  gap: 0;
  margin-bottom: 48px;
  border-bottom: 1px solid var(--line);
}
.agency-tab {
  flex: 1;
  padding: 24px 20px;
  text-align: left;
  cursor: pointer;
  border: none; background: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.3s;
  display: flex;
  flex-direction: column;
  gap: 6px;
  color: var(--ink-muted);
}
.agency-tab:hover { color: var(--ink-soft); }
.agency-tab.active { color: var(--ink); border-bottom-color: var(--accent); }
.agency-tab .t-label { font-family: var(--font-display); font-size: clamp(28px, 3vw, 40px); line-height: 1; }
.agency-tab .t-sub { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; }

.agency-panel {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 80px;
  align-items: start;
  animation: fadeInUp 0.5s cubic-bezier(.2,.8,.2,1);
}
.agency-panel h3 {
  font-size: clamp(36px, 4vw, 56px);
  margin-bottom: 24px;
  line-height: 1;
}
.agency-panel h3 em { color: var(--deep); font-style: italic; }
.agency-desc { font-size: 17px; color: var(--ink-soft); line-height: 1.65; margin-bottom: 24px; }
.agency-desc strong { color: var(--ink); font-weight: 500; }
.agency-highlights {
  list-style: none;
  display: grid;
  gap: 14px;
  margin-top: 28px;
}
.agency-highlights li {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  color: var(--ink-soft);
  font-size: 15px;
  line-height: 1.5;
}
.agency-highlights li::before {
  content: "";
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  margin-top: 9px;
  flex-shrink: 0;
}

.price-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 32px;
}
.price-card h4 {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 24px;
  font-weight: 500;
}
.price-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 14px 0;
  border-bottom: 1px solid var(--line);
  gap: 16px;
}
.price-row:last-of-type { border-bottom: none; }
.price-name { color: var(--ink); font-size: 15px; font-weight: 500; }
.price-meta { font-family: var(--font-mono); font-size: 10px; color: var(--ink-muted); letter-spacing: 0.08em; margin-top: 2px; }
.price-amt { font-family: var(--font-display); font-size: 22px; color: var(--deep); white-space: nowrap; }
.price-custom { font-size: 13px; color: var(--ink-muted); font-style: italic; }
.price-note {
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid var(--line);
  font-size: 13px;
  color: var(--ink-muted);
  font-style: italic;
  line-height: 1.5;
}

/* Layout variants for agencies */
[data-agency-layout="cards"] .agency-selector { display: none; }
[data-agency-layout="cards"] .agency-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 32px;
}
[data-agency-layout="cards"] .agency-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 40px 32px;
  display: flex; flex-direction: column;
  min-height: 100%;
  transition: transform 0.3s, box-shadow 0.3s;
}
[data-agency-layout="cards"] .agency-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 40px -20px rgba(15,30,40,0.15);
}
[data-agency-layout="cards"] .agency-card h3 { font-size: 40px; margin-bottom: 12px; }
[data-agency-layout="cards"] .agency-panel-content { display: none; }
[data-agency-layout="cards"] .agency-cards { display: grid; }

[data-agency-layout="accordion"] .agency-selector { display: none; }
[data-agency-layout="accordion"] .agency-panel-content { display: none; }
[data-agency-layout="accordion"] .accordion-item {
  border-bottom: 1px solid var(--line);
}
[data-agency-layout="accordion"] .accordion-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 32px 0; cursor: pointer;
}
[data-agency-layout="accordion"] .accordion-head h3 { font-size: clamp(32px, 4vw, 48px); }
[data-agency-layout="accordion"] .accordion-body {
  padding: 0 0 40px 0;
  max-width: 900px;
}
[data-agency-layout="accordion"] .accordion-toggle {
  width: 36px; height: 36px;
  border: 1px solid var(--line);
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 20px;
}

.agency-cards, .accordion-items { display: none; }
[data-agency-layout="tabs"] .agency-cards,
[data-agency-layout="tabs"] .accordion-items { display: none; }
[data-agency-layout="cards"] .agency-cards { display: grid; }
[data-agency-layout="accordion"] .accordion-items { display: block; }

@media (max-width: 900px) {
  .agency-panel { grid-template-columns: 1fr; gap: 40px; }
  .agency-selector { overflow-x: auto; }
  [data-agency-layout="cards"] .agency-cards { grid-template-columns: 1fr; }
}

/* ========== COMPARE TABLE ========== */
.compare { background: var(--bg); }
.compare-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 15px;
}
.compare-table thead th {
  text-align: left;
  padding: 24px 20px;
  border-bottom: 1px solid var(--line);
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 400;
  vertical-align: bottom;
}
.compare-table thead th span {
  display: block;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-top: 8px;
}
.compare-table tbody td {
  padding: 22px 20px;
  border-bottom: 1px solid var(--line);
  vertical-align: top;
  color: var(--ink-soft);
  line-height: 1.5;
}
.compare-table tbody td:first-child {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-muted);
  width: 180px;
}
.compare-table tbody tr:hover td { background: var(--bg-2); }
@media (max-width: 800px) {
  .compare-table, .compare-table thead, .compare-table tbody, .compare-table tr, .compare-table td, .compare-table th { display: block; }
  .compare-table thead { display: none; }
  .compare-table tr { padding: 24px 0; border-bottom: 1px solid var(--line); }
  .compare-table td { padding: 6px 0; border: none; }
  .compare-table td:first-child { color: var(--ink-muted); margin-bottom: 8px; }
  .compare-table td::before { content: attr(data-col); display: block; font-family: var(--font-mono); font-size: 9px; color: var(--accent); letter-spacing: 0.14em; text-transform: uppercase; margin-top: 10px; }
}

/* ========== SPECIALTIES ========== */
.specialties { background: var(--deep-2); color: #f0ede6; }
.specialties .sec-header h2 { color: #fff; }
.specialties .sec-header h2 em { color: var(--accent-soft); }
.specialties .sec-lead { color: rgba(240,237,230,0.75); }
.specialties .eyebrow { color: rgba(240,237,230,0.6); }
.specialties .eyebrow::before { background: rgba(240,237,230,0.4); }

.spec-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.12);
}
.spec-tab {
  background: none;
  border: none;
  color: rgba(240,237,230,0.4);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 12px 28px 12px 0;
  cursor: pointer;
  position: relative;
  transition: color 0.2s;
}
.spec-tab::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 28px;
  height: 2px;
  background: var(--accent-soft);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.2s;
}
.spec-tab.active { color: rgba(240,237,230,0.9); }
.spec-tab.active::after { transform: scaleX(1); }
.spec-tab:hover { color: rgba(240,237,230,0.65); }
.spec-tab-lead {
  font-size: 13px;
  color: rgba(240,237,230,0.55);
  margin-bottom: 28px;
  margin-top: 20px;
  max-width: 680px;
  line-height: 1.6;
}
.spec-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.08);
}
.spec-cell {
  background: var(--deep-2);
  padding: 32px 28px;
  transition: background 0.3s;
  cursor: default;
  min-height: 200px;
  display: flex; flex-direction: column;
  justify-content: space-between;
  gap: 20px;
}
.spec-cell:hover { background: rgba(255,255,255,0.03); }
.spec-num {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  color: rgba(240,237,230,0.4);
}
.spec-name {
  font-family: var(--font-display);
  font-size: 28px;
  line-height: 1;
  color: #fff;
}
.spec-name em { color: var(--accent-soft); font-style: italic; }
.spec-equiv {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  color: rgba(240,237,230,0.28);
  margin-top: 8px;
  text-transform: uppercase;
}
.spec-desc {
  font-size: 13px;
  color: rgba(240,237,230,0.7);
  line-height: 1.5;
}
.spec-price {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--accent-soft);
  letter-spacing: 0.1em;
}
@media (max-width: 900px) {
  .spec-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 500px) {
  .spec-grid { grid-template-columns: 1fr; }
}

/* ========== PLACES ========== */
.places { background: var(--bg); }
.places-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 32px;
}
.place-card {
  position: relative;
  aspect-ratio: 4/5;
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  background: var(--bg-3);
}
.place-card .place-img {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  transition: transform 0.7s cubic-bezier(.2,.8,.2,1);
}
.place-card:hover .place-img { transform: scale(1.05); }
.place-card::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 40%, rgba(10,30,45,0.8) 100%);
}
.place-info {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 28px;
  color: #fff;
  z-index: 2;
}
.place-info .mono { color: rgba(255,255,255,0.7); display: block; margin-bottom: 8px; }
.place-info h3 { font-size: 32px; line-height: 1; margin-bottom: 10px; color: #fff; }
.place-info p { font-size: 13px; color: rgba(255,255,255,0.85); max-width: 28ch; }
@media (max-width: 900px) {
  .places-grid { grid-template-columns: 1fr; }
}

/* ========== GEAR ========== */
.gear { background: var(--bg-2); }
.gear-grid {
  display: grid;
  grid-template-columns: 1fr 1.3fr;
  gap: 80px;
  align-items: center;
}
.gear-image {
  aspect-ratio: 1/1;
  border-radius: var(--radius-lg);
  background: var(--bg-3);
  background-image: url("images/gears.jpg");
  background-size: cover; background-position: center;
  position: relative;
  overflow: hidden;
}
.gear-items {
  display: grid; gap: 28px;
}
.gear-item { border-bottom: 1px solid var(--line); padding-bottom: 28px; }
.gear-item:last-child { border-bottom: none; }
.gear-item h4 { font-family: var(--font-display); font-size: 26px; margin-bottom: 10px; }
.gear-item p { color: var(--ink-soft); font-size: 15px; line-height: 1.6; }
@media (max-width: 900px) {
  .gear-grid { grid-template-columns: 1fr; gap: 48px; }
}

/* ========== INSURANCE ========== */
.insurance { background: var(--bg); }
.insurance-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}
.ins-card {
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 36px 32px;
  transition: all 0.3s;
}
.ins-card:hover { border-color: var(--deep); }
.ins-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 16px;
}
.ins-card h4 { font-family: var(--font-display); font-size: 30px; margin-bottom: 14px; line-height: 1.05; }
.ins-card p { color: var(--ink-soft); font-size: 14px; line-height: 1.6; }
@media (max-width: 900px) { .insurance-grid { grid-template-columns: 1fr; } }

/* ========== TESTIMONIALS ========== */
.testimonials { background: var(--bg-3); }
.testimonial-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 28px;
  align-items: start;
}
.testimonial-card {
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 36px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.testimonial-quote {
  font-family: var(--font-display);
  font-size: 40px;
  line-height: 1;
  color: var(--accent);
  opacity: 0.5;
}
.testimonial-text {
  font-size: 16px;
  line-height: 1.7;
  color: var(--ink);
  white-space: pre-line;
  flex: 1;
}
.testimonial-author {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding-top: 20px;
  border-top: 1px solid var(--line);
}
.testimonial-name {
  font-weight: 500;
  font-size: 15px;
  color: var(--ink);
}
.testimonial-course {
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--ink-muted);
  text-transform: uppercase;
}
.testimonial-cta {
  background: var(--bg);
  border: 1px dashed var(--line);
  border-radius: var(--radius-lg);
  padding: 36px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
  gap: 20px;
}
.testimonial-cta p {
  color: var(--ink-soft);
  font-size: 16px;
  line-height: 1.5;
}

/* ========== FAQ ========== */
.faq { background: var(--bg); }
.faq-list { max-width: 900px; margin-left: auto; }
.faq-item {
  border-bottom: 1px solid var(--line);
}
.faq-q {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  padding: 28px 0;
  text-align: left;
  gap: 20px;
}
.faq-q h4 { font-family: var(--font-display); font-size: clamp(22px, 2.2vw, 28px); font-weight: 400; line-height: 1.2; }
.faq-toggle {
  width: 36px; height: 36px;
  border: 1px solid var(--line);
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 16px;
  flex-shrink: 0;
  transition: all 0.3s;
  color: var(--ink-soft);
}
.faq-item.open .faq-toggle { background: var(--ink); color: var(--bg); border-color: var(--ink); transform: rotate(45deg); }
.faq-a {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s cubic-bezier(.2,.8,.2,1);
}
.faq-item.open .faq-a { max-height: 400px; }
.faq-a-inner { padding: 0 0 28px 0; color: var(--ink-soft); font-size: 16px; line-height: 1.65; max-width: 70ch; }

/* ========== CONTACT ========== */
.contact { background: var(--deep-2); color: #f0ede6; padding-bottom: 80px; }
.contact-title { color: #fff; font-size: clamp(55px, 6.3vw, 92px); line-height: 1.05; margin-bottom: 20px; }
.contact-title em { font-style: italic; color: var(--accent-soft); }
.contact .sec-lead { color: rgba(240,237,230,0.7); }
.contact .eyebrow { color: rgba(240,237,230,0.55); }
.contact .eyebrow::before { background: rgba(240,237,230,0.4); }

.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1.3fr;
  gap: 80px;
  align-items: start;
}
.contact-channels { display: grid; gap: 4px; }
.contact-channel {
  display: flex; align-items: center; gap: 20px;
  padding: 24px 0;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  transition: padding 0.25s;
}
.contact-channel:hover { padding-left: 10px; }
.contact-channel-icon {
  width: 48px; height: 48px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.25);
  display: grid; place-items: center;
  flex-shrink: 0;
  transition: all 0.3s;
  color: #fff;
}
.contact-channel:hover .contact-channel-icon { background: var(--accent); border-color: var(--accent); }
.contact-channel-text .mono { color: rgba(240,237,230,0.5); display: block; margin-bottom: 4px; font-size: 10px; }
.contact-channel-text .val { font-family: var(--font-display); font-size: 22px; color: #fff; }

.contact-form {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 40px;
  border-radius: var(--radius-lg);
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.form-field { display: flex; flex-direction: column; gap: 6px; }
.form-field label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(240,237,230,0.55);
}
.form-field input, .form-field select, .form-field textarea {
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.2);
  padding: 10px 0;
  color: #fff;
  font-family: var(--font-sans);
  font-size: 16px;
  transition: border-color 0.2s;
}
.form-field select option { background: var(--deep-2); color: #fff; }
.form-field input:focus, .form-field select:focus, .form-field textarea:focus {
  outline: none;
  border-bottom-color: var(--accent);
}
.form-field textarea { resize: vertical; min-height: 100px; font-family: var(--font-sans); }
.form-submit {
  margin-top: 24px;
  width: 100%;
  padding: 18px;
  background: #fff;
  color: var(--deep-2);
  font-weight: 500;
  border-radius: var(--radius);
  font-size: 14px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  transition: all 0.25s;
}
.form-submit:hover { background: var(--accent); color: #fff; }
.form-success {
  margin-top: 16px;
  padding: 14px;
  background: rgba(184,92,59,0.15);
  border: 1px solid var(--accent);
  font-size: 14px;
  text-align: center;
  border-radius: var(--radius);
  color: var(--accent-soft);
}
@media (max-width: 900px) {
  .contact-grid { grid-template-columns: 1fr; gap: 48px; }
  .form-row { grid-template-columns: 1fr; }
  .contact-form { padding: 28px; }
}

/* ========== FOOTER ========== */
.footer {
  background: var(--deep-2);
  color: rgba(240,237,230,0.5);
  padding: 40px var(--pad);
  border-top: 1px solid rgba(255,255,255,0.08);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  display: flex; justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
}

/* ========== TWEAKS PANEL ========== */
.tweaks-panel {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 200;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 20px;
  width: 280px;
  box-shadow: 0 30px 60px -20px rgba(10,30,45,0.25);
  font-family: var(--font-sans);
  transform: translateY(20px);
  opacity: 0; pointer-events: none;
  transition: all 0.3s cubic-bezier(.2,.8,.2,1);
}
.tweaks-panel.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
.tweaks-panel h5 {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink);
  margin-bottom: 14px;
  font-weight: 500;
}
.tweak-group { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--line); }
.tweak-group:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.tweak-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 10px;
}
.tweak-swatches { display: flex; gap: 8px; flex-wrap: wrap; }
.tweak-sw {
  width: 28px; height: 28px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform 0.2s;
}
.tweak-sw:hover { transform: scale(1.1); }
.tweak-sw.active { border-color: var(--ink); }
.tweak-options { display: grid; gap: 4px; }
.tweak-opt {
  padding: 8px 10px;
  font-size: 12px;
  border-radius: var(--radius);
  text-align: left;
  color: var(--ink-soft);
  transition: all 0.2s;
}
.tweak-opt:hover { background: var(--bg-2); }
.tweak-opt.active { background: var(--ink); color: var(--bg); }
.tweak-toggle {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0;
  font-size: 12px;
  cursor: pointer;
}
.tweak-switch {
  width: 36px; height: 20px;
  border-radius: 10px;
  background: var(--line);
  position: relative;
  transition: background 0.2s;
}
.tweak-switch.on { background: var(--accent); }
.tweak-switch::after {
  content: ""; position: absolute;
  top: 2px; left: 2px;
  width: 16px; height: 16px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.2s;
}
.tweak-switch.on::after { transform: translateX(16px); }

/* ========== WHATSAPP CHAT ========== */
.wa-fab {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 180;
  width: 56px; height: 56px;
  border-radius: 50%;
  background: #25D366;
  color: #fff;
  display: grid; place-items: center;
  box-shadow: 0 8px 24px -4px rgba(37,211,102,0.5), 0 4px 12px rgba(0,0,0,0.15);
  transition: transform 0.25s, background 0.25s;
  cursor: pointer;
}
.wa-fab:hover { transform: scale(1.08); }
.wa-fab.open { background: var(--ink); transform: scale(0.9); }
.wa-fab svg { width: 26px; height: 26px; }

.wa-chat {
  position: fixed;
  bottom: 92px;
  right: 24px;
  z-index: 181;
  width: 340px;
  max-width: calc(100vw - 48px);
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 20px 50px -10px rgba(10,30,45,0.4), 0 8px 16px rgba(0,0,0,0.08);
  overflow: hidden;
  font-family: var(--font-sans);
  display: flex; flex-direction: column;
  transform: translateY(20px) scale(0.96);
  opacity: 0;
  pointer-events: none;
  transform-origin: bottom right;
  transition: transform 0.3s cubic-bezier(.2,.8,.2,1), opacity 0.3s;
}
.wa-chat.open { transform: translateY(0) scale(1); opacity: 1; pointer-events: auto; }
.wa-head {
  background: #075E54;
  color: #fff;
  padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
}
.wa-avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: #25D366;
  display: grid; place-items: center;
  color: #fff;
  flex-shrink: 0;
}
.wa-head-text { flex: 1; display: flex; flex-direction: column; line-height: 1.2; }
.wa-head-text strong { font-size: 15px; font-weight: 600; }
.wa-head-text span { font-size: 12px; color: rgba(255,255,255,0.75); margin-top: 2px; }
.wa-close { color: #fff; padding: 4px; opacity: 0.8; }
.wa-close:hover { opacity: 1; }

.wa-body {
  background: #ECE5DD;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.5) 1px, transparent 1px),
    radial-gradient(circle at 60% 70%, rgba(255,255,255,0.3) 1px, transparent 1px);
  background-size: 30px 30px;
  padding: 20px 16px;
  min-height: 160px;
  flex: 1;
}
.wa-bubble {
  background: #fff;
  border-radius: 2px 10px 10px 10px;
  padding: 10px 12px 8px;
  max-width: 80%;
  box-shadow: 0 1px 1px rgba(0,0,0,0.08);
  font-size: 14px;
  color: #1c1c1c;
  position: relative;
}
.wa-bubble-name { font-size: 12px; font-weight: 600; color: #075E54; margin-bottom: 4px; }
.wa-bubble-text { line-height: 1.45; }
.wa-bubble-time { font-size: 10px; color: #8a8a8a; margin-top: 4px; text-align: right; }

.wa-input-row {
  display: flex; gap: 8px; align-items: flex-end;
  padding: 10px 12px;
  background: #F0F0F0;
  border-top: 1px solid #ddd;
}
.wa-input {
  flex: 1;
  resize: none;
  border: none;
  background: #fff;
  border-radius: 18px;
  padding: 10px 14px;
  font-size: 14px;
  font-family: var(--font-sans);
  line-height: 1.4;
  color: #1c1c1c;
  max-height: 100px;
  min-height: 38px;
}
.wa-input:focus { outline: none; box-shadow: 0 0 0 2px rgba(37,211,102,0.3); }
.wa-send {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: #25D366;
  color: #fff;
  display: grid; place-items: center;
  flex-shrink: 0;
  transition: background 0.2s;
}
.wa-send:hover { background: #128C7E; }
.wa-footer {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-align: center;
  padding: 8px;
  color: #8a8a8a;
  background: #F0F0F0;
  border-top: 1px solid #ddd;
}

/* keep dark mode readable */
[data-theme="dark"] .wa-chat { background: #222; }

/* Tweaks panel — shift to bottom left so it doesn't overlap the WhatsApp fab */
.tweaks-panel { bottom: 24px; left: 24px; right: auto; }

@media (max-width: 560px) {
  .wa-chat { bottom: 88px; left: 12px; right: 12px; width: auto; max-width: none; }
  .wa-fab { bottom: 16px; right: 16px; width: 52px; height: 52px; }
}

/* ========== ANIMATIONS ========== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.reveal {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.8s cubic-bezier(.2,.8,.2,1), transform 0.8s cubic-bezier(.2,.8,.2,1);
}
.reveal.visible { opacity: 1; transform: translateY(0); }

/* placeholder hero images */
.placeholder-bg {
  background: linear-gradient(135deg, #0a2838 0%, #0f3a4f 50%, #1a4d5f 100%);
  position: relative;
}
.placeholder-bg::after {
